# Local-only stack. SECURITY: every host port is bound to 127.0.0.1 only.
# qdrant and ollama have NO host port binding (unauthenticated by default);
# they are reachable only over the internal mcpnet network by the MCP servers.
# Do NOT change any binding to 0.0.0.0. See tasks/PLAN.md §6.1, §8, §9.
services:
  qdrant:
    image: qdrant/qdrant:${QDRANT_TAG:-v1.12.5}
    # No `ports:` entry — never publish Qdrant (no default auth). Debug via docker exec.
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - mcpnet
    restart: unless-stopped

  ollama:
    image: ollama/ollama:${OLLAMA_TAG:-0.4.0}
    # No `ports:` entry — never publish Ollama (no default auth). Debug via docker exec.
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - mcpnet
    restart: unless-stopped

  telemetry-mcp:
    build: ./projects/telemetry-mcp
    environment:
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN:?MCP_AUTH_TOKEN is required}
      - NVIDIA_NIM_API_KEY=${NVIDIA_NIM_API_KEY}
      - NVIDIA_NIM_BASE_URL=${NVIDIA_NIM_BASE_URL:-https://integrate.api.nvidia.com/v1}
      - NVIDIA_NIM_MODEL=${NVIDIA_NIM_MODEL:-meta/llama-3.1-70b-instruct}
    ports:
      - "127.0.0.1:${TELEMETRY_MCP_PORT:-8100}:8000"
    networks:
      - mcpnet
    restart: unless-stopped

  rag-mcp:
    build: ./projects/rag-mcp
    depends_on:
      - qdrant
      - ollama
    environment:
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN:?MCP_AUTH_TOKEN is required}
      - QDRANT_URL=http://qdrant:6333
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-bge-m3}
      - OLLAMA_EMBED_MODEL_FALLBACK=${OLLAMA_EMBED_MODEL_FALLBACK:-nomic-embed-text}
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-nasa_ntrs}
      - NVIDIA_NIM_API_KEY=${NVIDIA_NIM_API_KEY}
      - NVIDIA_NIM_BASE_URL=${NVIDIA_NIM_BASE_URL:-https://integrate.api.nvidia.com/v1}
      - NVIDIA_NIM_MODEL=${NVIDIA_NIM_MODEL:-meta/llama-3.1-70b-instruct}
    ports:
      - "127.0.0.1:${RAG_MCP_PORT:-8101}:8000"
    networks:
      - mcpnet
    restart: unless-stopped

volumes:
  qdrant-data:
  ollama-models:

networks:
  mcpnet:
    driver: bridge
